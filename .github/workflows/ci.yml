name: CI Quality Check

on:
  push:
    branches:
      - main

jobs:
  quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: make install

      - name: Run linter (ruff)
        run: make lint

      - name: Run type checker (mypy)
        run: make type

      - name: Download dataset from Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: |
          mkdir -p data
          uvx kaggle datasets download -d sharmajicoder/used-car-price-prediction-dataset
          unzip used-car-price-prediction-dataset.zip -d data/

      - name: Start MLflow server
        run: |
          nohup make mlflow > mlflow.log 2>&1 &
          sleep 5

      - name: Run tests (pytest)
        run: make test

      - name: Train model with Optuna
        run: make train-optuna
